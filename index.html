<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>e-Gym City</title>
  <style>
    :root {
      --bg: #10223f;
      --panel: #18365f;
      --panel-light: #245184;
      --text: #fff7d6;
      --sub: #b9d7ff;
      --accent: #2dd4ff;
      --accent2: #ffd84d;
      --danger: #ff6b6b;
      --ok: #70e27b;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #244d82 0%, var(--bg) 55%, #071426 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .game {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .header {
      grid-column: 1 / -1;
      background: linear-gradient(180deg, #1f5fa3, #123864);
      border: 4px solid #071426;
      box-shadow: 0 8px 0 #06101f, 0 14px 24px var(--shadow);
      border-radius: 18px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
      text-shadow: 3px 3px 0 #06101f;
    }

    .logo-img {
      height: 56px;
      width: auto;
      max-width: 100%;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 0 #06101f);
    }

    .mute-btn {
      cursor: pointer;
      font-size: 18px;
      padding: 6px 12px;
      transition: transform 0.1s;
    }
    
    .mute-btn:active {
      transform: scale(0.9);
    }

    .score-board {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .score-chip {
      background: #09213e;
      border: 3px solid #3a82ca;
      border-radius: 14px;
      padding: 8px 12px;
      font-weight: 800;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25);
      white-space: nowrap;
    }

    .city-panel, .task-panel {
      background: rgba(10, 29, 54, 0.92);
      border: 4px solid #071426;
      border-radius: 18px;
      box-shadow: 0 8px 0 #06101f, 0 14px 24px var(--shadow);
      overflow: hidden;
    }

    .city-scene {
      position: relative;
      min-height: 560px;
      padding: 18px;
      background: linear-gradient(180deg, #71c8ff 0%, #b8f0ff 42%, #8bd66d 43%, #4caf50 100%);
    }

    .sky-title {
      position: absolute;
      left: 18px;
      top: 14px;
      background: rgba(8, 24, 45, 0.78);
      border: 3px solid rgba(255,255,255,0.45);
      border-radius: 14px;
      padding: 8px 12px;
      font-weight: 900;
      color: white;
      text-shadow: 2px 2px 0 #06101f;
    }

    .background-img {
      position: absolute;
      left: 50%;
      top: 74px;
      transform: translateX(-50%);
      width: min(92%, 512px);
      image-rendering: pixelated;
      opacity: 0.95;
      border: 4px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
    }

    .gym-img {
      position: absolute;
      left: 50%;
      bottom: 110px;
      transform: translateX(-50%);
      width: 280px;
      height: auto;
      image-rendering: pixelated;
      filter: drop-shadow(0 10px 0 rgba(0,0,0,0.25));
      transition: transform 0.25s ease;
    }

    .gym-img.level-up {
      animation: pop 0.55s ease;
    }

    .mascot-img {
      position: absolute;
      left: calc(50% + 130px);
      bottom: 90px;
      width: 100px;
      height: auto;
      image-rendering: pixelated;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,0.2));
      animation: idle 1.6s infinite ease-in-out;
      z-index: 10;
    }

    .object {
      position: absolute;
      image-rendering: pixelated;
      filter: drop-shadow(0 7px 0 rgba(0,0,0,0.18));
    }

    .tree { height: 184px; width: auto; left: 20px; bottom: 85px; transition: all 0.3s ease; }
    .tree-apple { height: 195px !important; left: -5px !important; bottom: 75px !important; }
    .bench { width: 170px; right: 70px; bottom: 75px; }
    .dumbbell { width: 90px; left: 230px; bottom: 85px; }
    .protein { width: 45px; left: 325px; bottom: 85px; z-index: 5; }
    .streetlamp { width: 120px; right: 20px; bottom: 100px; }

    .message-box {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      background: rgba(8, 24, 45, 0.9);
      border: 4px solid rgba(255,255,255,0.7);
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 800;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .task-panel {
      padding: 18px;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 24px;
      text-shadow: 2px 2px 0 #06101f;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    #taskInput {
      grid-column: 1 / -1;
    }

    input, select, button {
      font: inherit;
    }

    .task-input, .task-type {
      border: 3px solid #071426;
      background: #fff7d6;
      color: #10223f;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      outline: none;
    }

    .add-btn, .reset-btn, .confirm-btn, .cancel-btn {
      border: 3px solid #071426;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 #06101f;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .add-btn:active, .reset-btn:active, .confirm-btn:active, .cancel-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #06101f;
    }

    .add-btn {
      grid-column: 1 / -1;
      background: var(--accent2);
      color: #10223f;
    }

    .task-list {
      display: grid;
      gap: 10px;
      max-height: 430px;
      overflow: auto;
      padding-right: 4px;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg, var(--panel-light), var(--panel));
      border: 3px solid #071426;
      border-radius: 14px;
      padding: 10px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.22);
    }

    .task-item.done {
      opacity: 0.74;
      background: linear-gradient(180deg, #24415f, #152a43);
    }

    .task-checkbox {
      width: 24px;
      height: 24px;
      accent-color: #70e27b;
      cursor: pointer;
    }

    .task-name {
      font-weight: 900;
      word-break: break-word;
    }

    .task-item.done .task-name {
      text-decoration: line-through;
      color: var(--sub);
    }

    .badge {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 900;
      color: #06101f;
      background: #fff7d6;
      white-space: nowrap;
    }

    .badge.daily { background: #9be7ff; }
    .badge.extra { background: #ffd84d; }
    .badge.emergency { background: #ff9b6b; }

    .delete-btn {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .move-btn {
      background: none;
      border: none;
      color: #92b6e6;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
    }
    .move-btn:hover {
      color: #fff;
    }
    .move-btn:disabled {
      color: #3e5a80;
      cursor: not-allowed;
    }

    .empty {
      color: var(--sub);
      padding: 18px;
      border: 3px dashed #3a82ca;
      border-radius: 14px;
      text-align: center;
      font-weight: 800;
    }

    .footer-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .reset-btn {
      background: #24415f;
      color: var(--text);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(620px, 100%);
      background: #112d52;
      border: 4px solid #071426;
      border-radius: 18px;
      box-shadow: 0 8px 0 #06101f, 0 14px 24px var(--shadow);
      padding: 20px;
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    .modal p {
      line-height: 1.6;
      color: var(--sub);
      font-weight: 800;
    }

    .undone-list {
      background: rgba(0,0,0,0.22);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 12px 0;
      max-height: 220px;
      overflow: auto;
    }

    .recurring-item {
      background: #123864;
      border: 2px solid #071426;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .recurring-info {
      font-weight: bold;
      color: #fff;
    }
    .freq-badge {
      background: #4caf50;
      color: #fff;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      margin-right: 6px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .confirm-btn {
      background: var(--ok);
      color: #06101f;
    }

    .cancel-btn {
      background: #ffcf66;
      color: #06101f;
    }

    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes pop {
      0% { transform: translateX(-50%) scale(1); }
      40% { transform: translateX(-50%) scale(1.12); }
      100% { transform: translateX(-50%) scale(1); }
    }

    @keyframes coinFall {
      0% { top: -50px; transform: rotate(0deg); opacity: 1; }
      100% { top: 600px; transform: rotate(360deg); opacity: 1; }
    }

    .coin-effect {
      position: absolute;
      width: 90px;
      height: auto;
      z-index: 100;
      pointer-events: none;
      image-rendering: pixelated;
      animation: coinFall 1.2s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @media (max-width: 880px) {
      body { padding: 14px; }
      .game { grid-template-columns: 1fr; }
      .header { align-items: flex-start; flex-direction: column; }
      .score-board { justify-content: flex-start; }
      .city-scene { min-height: 520px; }
      .mascot-img { left: calc(50% + 100px); }
    }
    /* スマホ対応（レスポンシブデザイン） */
    @media (max-width: 850px) {
      body { padding: 10px; }
      .game { grid-template-columns: 1fr; gap: 16px; }
      
      /* ヘッダーの調整 */
      .header { position: relative; flex-direction: column; text-align: center; gap: 8px; padding: 14px 10px; }
      .title { font-size: 24px; margin-top: 5px; }
      .mute-btn { position: absolute; top: 15px; right: 15px; padding: 4px 8px; font-size: 14px; }
      .score-board { justify-content: center; gap: 4px; flex-wrap: wrap; }
      .score-chip:not(.mute-btn) { font-size: 11px; padding: 5px 6px; letter-spacing: -0.5px; }
      
      /* 街の景色の調整 */
      .city-scene { min-height: 360px; padding: 10px; }
      .sky-title { font-size: 12px; left: 10px; top: 10px; padding: 4px 8px; }
      .background-img { top: 40px; width: 92%; }
      
      .gym-img { width: 170px; bottom: 85px; }
      .tree { height: 110px; left: 0px; bottom: 70px; }
      .tree-apple { height: 115px !important; left: -5px !important; bottom: 65px !important; }
      .streetlamp { width: 70px; right: 10px; bottom: 80px; }
      .bench { width: 100px; right: 45px; bottom: 55px; }
      
      .dumbbell { width: 55px; left: calc(50% - 50px); bottom: 70px; }
      .protein { width: 28px; left: calc(50% + 15px); bottom: 70px; }
      
      .mascot-img { width: 80px; left: auto; right: 10px; bottom: 50px; }
      .message-box { font-size: 13px; padding: 10px 80px 10px 10px; bottom: 10px; left: 10px; right: 10px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <header class="header">
      <img class="logo-img" src="assets/e_gym_city_ロゴ.png" alt="e-Gym City" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" />
      <h1 class="title" style="display: none;">e-Gym City</h1>
      <div class="score-board">
        <button id="muteBtn" class="score-chip mute-btn" type="button" title="サウンドON/OFF">🔊</button>
        <div class="score-chip">🏅 合計 <span id="totalPoints">0</span> pt</div>
        <div class="score-chip">🏢 Gym Lv.<span id="gymLevel">1</span></div>
        <div class="score-chip">🐤 今日 <span id="todayPoints">0</span> pt</div>
        <div class="score-chip">📅 ログイン <span id="loginDaysDisplay">1</span> 日目</div>
      </div>
    </header>

    <section class="city-panel">
      <div class="city-scene">
        <div class="sky-title">タスクで街を育てよう！</div>
        <img id="bgImage" class="background-img" src="assets/town_background.png" alt="街の背景" onerror="this.style.display='none'" />
        <img id="gymImage" class="gym-img" src="assets/gym_lv1.png" alt="ジム" />
        <img id="mascotImage" class="mascot-img" src="assets/chick_normal.png" alt="筋肉ヒヨコ" />

        <img id="treeImage" class="object tree" src="assets/tree.png" alt="木" onerror="this.style.display='none'" />
        <img class="object bench" src="assets/bench.png" alt="ベンチ" onerror="this.style.display='none'" />
        <img id="dumbbellImage" class="object dumbbell" src="assets/dumbbell.png" alt="ダンベル" style="display: none;" onerror="this.style.display='none'" />
        <img id="proteinImage" class="object protein" src="assets/protein.png" alt="プロテイン" style="display: none;" onerror="this.style.display='none'" />
        <img class="object streetlamp" src="assets/streetlamp.png" alt="街灯" onerror="this.style.display='none'" />

        <div id="messageBox" class="message-box">今日もピヨっと1タスクから始めよう！</div>
      </div>
    </section>

    <section class="task-panel">
      <h2 class="panel-title">タスク一覧<span id="todayDateDisplay" style="font-size: 20px; color: var(--sub); margin-left: 12px; font-weight: normal;"></span></h2>

      <form id="taskForm" class="form">
        <input id="taskInput" class="task-input" type="text" placeholder="タスクを入力" autocomplete="off" />
        <input id="taskDeadline" class="task-input" type="date" title="期限を設定（任意）" />
        <select id="taskType" class="task-type">
          <option value="daily">毎日 1pt</option>
          <option value="extra">追加 2pt</option>
          <option value="emergency">臨時 3pt</option>
        </select>
        <button class="add-btn" type="submit">＋ タスク追加</button>
      </form>

      <div id="taskList" class="task-list"></div>

      <div class="footer-actions">
        <button id="openRecurringModalBtn" class="reset-btn" type="button">🔄 定期タスク設定</button>
        <button id="manualDayCheckBtn" class="reset-btn" type="button">翌日チェック画面を表示</button>
        <button id="hardResetBtn" class="reset-btn" type="button">全データ初期化</button>
      </div>
    </section>
  </main>

  <div id="dayCheckModal" class="modal-backdrop">
    <div class="modal">
      <h2>昨日のタスク確認</h2>
      <p>やり残しがないか確認してください。確認OKを押すと、完了チェックだけリセットされます。タスク内容と合計ポイントは残ります。</p>
      <div id="undoneList" class="undone-list"></div>
      <div class="modal-actions">
        <button id="cancelDayCheckBtn" class="cancel-btn" type="button">まだ確認する</button>
        <button id="confirmDayResetBtn" class="confirm-btn" type="button">確認OK・チェックリセット</button>
      </div>
    </div>
  </div>

  <div id="recurringModal" class="modal-backdrop">
    <div class="modal">
      <h2>🔄 定期タスク設定</h2>
      <p>毎朝自動で追加される固定タスクを登録できます。</p>
      
      <form id="recurringForm" class="form" style="grid-template-columns: 1fr; gap: 8px;">
        <div style="display: flex; gap: 8px;">
          <select id="recurringFreq" class="task-type" style="flex: 1;">
            <option value="daily">毎日</option>
            <option value="weekly">毎週</option>
            <option value="monthly">毎月</option>
          </select>
          <select id="recurringFreqValue" class="task-type" style="flex: 1; display: none;"></select>
        </div>
        <input id="recurringInput" class="task-input" type="text" placeholder="定期タスク名" required />
        <select id="recurringType" class="task-type">
          <option value="daily">毎日 1pt</option>
          <option value="extra">追加 2pt</option>
          <option value="emergency">臨時 3pt</option>
        </select>
        <button class="add-btn" type="submit">＋ 登録する</button>
      </form>
      
      <div id="recurringList" class="undone-list" style="margin-top: 14px; max-height: 220px;"></div>

      <div class="modal-actions" style="margin-top: 14px;">
        <button id="closeRecurringBtn" class="cancel-btn" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "eGymCitySaveData_v1";

    const POINTS = {
      daily: 1,
      extra: 2,
      emergency: 3
    };

    const TYPE_LABELS = {
      daily: "毎日",
      extra: "追加",
      emergency: "臨時"
    };

    const MASCOTS = {
      normal: "assets/chick_normal.png",
      happy: "assets/chick_happy.png",
      tired: "assets/chick_tired.png",
      surprised: "assets/chick_surprised.png",
      sleep: "assets/chick_sleep.png"
    };

    const initialState = {
      tasks: [],
      recurringTasks: [],
      totalPoints: 0,
      todayPoints: 0,
      lastOpenedDate: getTodayString(),
      loginDays: 1,
      mascotState: "normal",
      soundEnabled: true
    };

    let state = loadState();

    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const taskDeadline = document.getElementById("taskDeadline");
    const taskType = document.getElementById("taskType");
    const taskList = document.getElementById("taskList");
    const totalPoints = document.getElementById("totalPoints");
    const todayPoints = document.getElementById("todayPoints");
    const gymLevel = document.getElementById("gymLevel");
    const gymImage = document.getElementById("gymImage");
    const bgImage = document.getElementById("bgImage");
    const mascotImage = document.getElementById("mascotImage");
    const proteinImage = document.getElementById("proteinImage");
    const treeImage = document.getElementById("treeImage");
    const dumbbellImage = document.getElementById("dumbbellImage");
    const messageBox = document.getElementById("messageBox");
    const dayCheckModal = document.getElementById("dayCheckModal");
    const undoneList = document.getElementById("undoneList");
    const manualDayCheckBtn = document.getElementById("manualDayCheckBtn");
    const hardResetBtn = document.getElementById("hardResetBtn");
    const cancelDayCheckBtn = document.getElementById("cancelDayCheckBtn");
    const confirmDayResetBtn = document.getElementById("confirmDayResetBtn");
    const muteBtn = document.getElementById("muteBtn");
    const loginDaysDisplay = document.getElementById("loginDaysDisplay");
    const todayDateDisplay = document.getElementById("todayDateDisplay");

    const openRecurringModalBtn = document.getElementById("openRecurringModalBtn");
    const recurringModal = document.getElementById("recurringModal");
    const closeRecurringBtn = document.getElementById("closeRecurringBtn");
    const recurringForm = document.getElementById("recurringForm");
    const recurringFreq = document.getElementById("recurringFreq");
    const recurringFreqValue = document.getElementById("recurringFreqValue");
    const recurringInput = document.getElementById("recurringInput");
    const recurringType = document.getElementById("recurringType");
    const recurringList = document.getElementById("recurringList");

    const WEEK_DAYS = ["日", "月", "火", "水", "木", "金", "土"];
    let holidaysCache = {};

    async function fetchHolidays() {
      try {
        const res = await fetch("https://holidays-jp.github.io/api/v1/date.json");
        if (res.ok) {
          holidaysCache = await res.json();
          render();
        }
      } catch (error) {
        console.error("祝日データの取得に失敗しました", error);
      }
    }

    init();

    function init() {
      fetchHolidays();
      if (!state.loginDays) state.loginDays = 1;
      const today = getTodayString();
      if (state.lastOpenedDate !== today) {
        openDayCheckModal();
      } else {
        setMascot("normal", messageBox ? messageBox.textContent : "");
      }
      if (state.soundEnabled === undefined) state.soundEnabled = true;
      updateMuteBtn();
      updateBackground();
      setInterval(updateBackground, 60000);
      render();
    }

    muteBtn.addEventListener("click", () => {
      state.soundEnabled = !state.soundEnabled;
      updateMuteBtn();
      saveState();
    });

    function updateMuteBtn() {
      muteBtn.textContent = state.soundEnabled ? "🔊" : "🔇";
      muteBtn.style.opacity = state.soundEnabled ? "1" : "0.6";
    }

    function updateBackground() {
      if (!bgImage) return;
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 17) {
        bgImage.src = "assets/town_background.png";
      } else if (hour >= 17 && hour < 20) {
        bgImage.src = "assets/town_background17.png";
      } else {
        bgImage.src = "assets/town_background20.png";
      }
    }

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = taskInput.value.trim();
      const type = taskType.value;
      if (!name) return;

      state.tasks.unshift({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        name,
        type,
        deadline: taskDeadline.value || null,
        done: false,
        createdAt: new Date().toISOString()
      });

      taskInput.value = "";
      taskDeadline.value = "";
      setMascot("normal", "新しいタスクを登録したピヨ！");
      playSound("ヒヨコの鳴き声.mp3");
      saveState();
      render();
    });

    manualDayCheckBtn.addEventListener("click", openDayCheckModal);

    hardResetBtn.addEventListener("click", () => {
      const ok = confirm("本当に全データを初期化しますか？ タスク・ポイントがすべて消えます。");
      if (!ok) return;
      state = { ...initialState, tasks: [], lastOpenedDate: getTodayString() };
      saveState();
      render();
    });

    cancelDayCheckBtn.addEventListener("click", () => {
      dayCheckModal.classList.remove("show");
    });

    confirmDayResetBtn.addEventListener("click", () => {
      state.tasks = state.tasks.filter(task => !task.done);

      if (state.recurringTasks && state.recurringTasks.length > 0) {
        const todayDate = new Date();
        const dayOfWeek = todayDate.getDay();
        const dateOfMonth = todayDate.getDate();

        state.recurringTasks.forEach(rt => {
          let shouldSpawn = false;
          if (rt.frequency === "daily") {
             shouldSpawn = true;
          } else if (rt.frequency === "weekly" && parseInt(rt.freqValue) === dayOfWeek) {
             shouldSpawn = true;
          } else if (rt.frequency === "monthly" && parseInt(rt.freqValue) === dateOfMonth) {
             shouldSpawn = true;
          }

          if (shouldSpawn) {
             state.tasks.unshift({
               id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
               name: rt.name,
               type: rt.type,
               deadline: null,
               done: false,
               createdAt: new Date().toISOString()
             });
          }
        });
      }

      state.todayPoints = 0;
      state.loginDays = (state.loginDays || 1) + 1;
      state.lastOpenedDate = getTodayString();
      setMascot("normal", "新しい1日が始まったピヨ！今日も街を育てよう！");
      saveState();
      dayCheckModal.classList.remove("show");
      render();
    });

    function toggleTask(taskId, checked) {
      const taskIndex = state.tasks.findIndex(item => item.id === taskId);
      if (taskIndex === -1) return;

      const task = state.tasks[taskIndex];
      const point = POINTS[task.type];

      if (checked && !task.done) {
        task.done = true;
        state.totalPoints += point;
        state.todayPoints += point;

        if (point === 1) playSound("キラッ1.mp3");
        else if (point === 2) playSound("キラッ2.mp3");
        else if (point >= 3) playSound("決定ボタンを押す21.mp3");
        
        spawnCoins(point);

        let msg = "";
        if (task.type === "emergency") {
          msg = `臨時対応クリア！ +${point}pt ピヨッ！！`;
        } else if (task.type === "extra") {
          msg = `追加タスク達成！ +${point}pt すごいピヨ！`;
        } else {
          msg = `毎日タスク達成！ +${point}pt ピヨ！`;
        }

        const completedCount = state.tasks.filter(t => t.done).length;
        if (completedCount === 5) {
          msg += "\nあっ！木にリンゴが実ったピヨ！";
        } else if (completedCount === 15) {
          msg += "\nすごいピヨ！木に金のリンゴが実ったピヨ！！";
        }

        setMascot(task.type === "emergency" ? "surprised" : "happy", msg);

        state.tasks.splice(taskIndex, 1);
        state.tasks.push(task);
      } else if (!checked && task.done) {
        task.done = false;
        state.totalPoints = Math.max(0, state.totalPoints - point);
        state.todayPoints = Math.max(0, state.todayPoints - point);
        setMascot("tired", `チェックを戻したピヨ。 -${point}pt`);

        state.tasks.splice(taskIndex, 1);
        const firstDoneIndex = state.tasks.findIndex(t => t.done);
        if (firstDoneIndex === -1) {
          state.tasks.push(task);
        } else {
          state.tasks.splice(firstDoneIndex, 0, task);
        }
      }

      saveState();
      render(true);
    }

    function deleteTask(taskId) {
      const task = state.tasks.find(item => item.id === taskId);
      if (!task) return;

      const ok = confirm(`「${task.name}」を削除しますか？`);
      if (!ok) return;

      if (task.done) {
        const point = POINTS[task.type];
        state.totalPoints = Math.max(0, state.totalPoints - point);
        state.todayPoints = Math.max(0, state.todayPoints - point);
      }

      state.tasks = state.tasks.filter(item => item.id !== taskId);
      setMascot("normal", "タスクを整理したピヨ！");
      saveState();
      render();
    }

    function moveTask(taskId, direction) {
      const index = state.tasks.findIndex(t => t.id === taskId);
      if (index === -1) return;

      const task = state.tasks[index];
      if (task.done) return;

      const uncheckedTasks = state.tasks.filter(t => !t.done);
      const uIndex = uncheckedTasks.indexOf(task);
      const targetUIndex = uIndex + direction;

      if (targetUIndex < 0 || targetUIndex >= uncheckedTasks.length) return;

      const targetTask = uncheckedTasks[targetUIndex];
      const targetIndex = state.tasks.indexOf(targetTask);

      state.tasks.splice(index, 1);
      state.tasks.splice(targetIndex, 0, task);

      saveState();
      render();
    }

    function render(animateGym = false) {
      totalPoints.textContent = state.totalPoints;
      todayPoints.textContent = state.todayPoints;
      if (loginDaysDisplay) loginDaysDisplay.textContent = state.loginDays || 1;
      if (todayDateDisplay) {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const dateString = `${year}-${month}-${day}`;
        const dayOfWeek = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
        
        const isSunday = now.getDay() === 0;
        const isSaturday = now.getDay() === 6;
        const holidayName = holidaysCache[dateString];

        let color = "var(--sub)";
        let text = `（${year}/${month}/${day} ${dayOfWeek}）`;

        if (holidayName) {
          color = "#ff6b6b";
          text = `（${year}/${month}/${day} ${dayOfWeek} ${holidayName}）`;
        } else if (isSunday) {
          color = "#ff6b6b";
        } else if (isSaturday) {
          color = "#71c8ff";
        }
        
        todayDateDisplay.style.color = color;
        todayDateDisplay.textContent = text;
      }

      if (proteinImage) {
        proteinImage.style.display = state.loginDays >= 10 ? "block" : "none";
      }

      const completedCount = state.tasks.filter(t => t.done).length;

      if (treeImage) {
        if (completedCount >= 15) {
          treeImage.src = "assets/treeGoldApple.png";
          treeImage.className = "object tree tree-apple";
        } else if (completedCount >= 5) {
          treeImage.src = "assets/treeApple.png";
          treeImage.className = "object tree tree-apple";
        } else {
          treeImage.src = "assets/tree.png";
          treeImage.className = "object tree";
        }
      }

      if (dumbbellImage) {
        const isDumbbellVisible = completedCount >= 10;
        dumbbellImage.style.display = isDumbbellVisible ? "block" : "none";
        if (isDumbbellVisible) {
          if (state.loginDays >= 40) {
            dumbbellImage.src = "assets/Gold dumbbell.png";
          } else if (state.loginDays >= 20) {
            dumbbellImage.src = "assets/Silver dumbbell.png";
          } else {
            dumbbellImage.src = "assets/dumbbell.png";
          }
        }
      }

      const level = getGymLevel(state.totalPoints);
      gymLevel.textContent = level;
      gymImage.src = `assets/gym_lv${level}.png`;

      if (animateGym) {
        gymImage.classList.remove("level-up");
        void gymImage.offsetWidth;
        gymImage.classList.add("level-up");
      }

      let mascotSrc = MASCOTS[state.mascotState] || MASCOTS.normal;
      if (state.mascotState === "normal") {
        if (state.loginDays >= 50) {
          mascotSrc = "assets/chick_normal GoldCrown.png";
        } else if (state.loginDays >= 30) {
          mascotSrc = "assets/chick_normal SilverCrown.png";
        }
      }
      mascotImage.src = mascotSrc;

      taskList.innerHTML = "";
      if (state.tasks.length === 0) {
        taskList.innerHTML = `<div class="empty">まだタスクがありません。まずは1つ登録してみよう！</div>`;
        return;
      }

      state.tasks.forEach(task => {
        const item = document.createElement("div");
        item.className = `task-item ${task.done ? "done" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "task-checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => toggleTask(task.id, checkbox.checked));

        const name = document.createElement("div");
        name.className = "task-name";
        
        let textHTML = escapeHtml(task.name);
        if (task.deadline) {
          const todayStr = getTodayString();
          const displayDate = task.deadline.replace(/-/g, '/');
          if (!task.done && task.deadline < todayStr) {
            textHTML = `<span style="color: #ff6b6b; font-size: 0.85em; font-weight: bold; margin-right: 6px; text-decoration: underline;">[期限超過: ${displayDate}]</span>` + textHTML;
          } else {
            textHTML = `<span style="color: #ff9f43; font-size: 0.85em; font-weight: bold; margin-right: 6px;">[期限: ${displayDate}]</span>` + textHTML;
          }
        }
        name.innerHTML = textHTML;

        const badge = document.createElement("div");
        badge.className = `badge ${task.type}`;
        badge.textContent = `${TYPE_LABELS[task.type]} +${POINTS[task.type]}pt`;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.type = "button";
        del.textContent = "削除";
        del.addEventListener("click", () => deleteTask(task.id));

        const actions = document.createElement("div");
        actions.style.display = "flex";
        actions.style.alignItems = "center";
        actions.style.gap = "8px";
        
        actions.appendChild(badge);

        if (!task.done) {
          const uncheckedTasks = state.tasks.filter(t => !t.done);
          const uIndex = uncheckedTasks.indexOf(task);

          const upBtn = document.createElement("button");
          upBtn.className = "move-btn";
          upBtn.textContent = "↑";
          upBtn.title = "上に移動";
          upBtn.disabled = (uIndex === 0);
          upBtn.addEventListener("click", () => moveTask(task.id, -1));

          const downBtn = document.createElement("button");
          downBtn.className = "move-btn";
          downBtn.textContent = "↓";
          downBtn.title = "下に移動";
          downBtn.disabled = (uIndex === uncheckedTasks.length - 1);
          downBtn.addEventListener("click", () => moveTask(task.id, 1));

          actions.appendChild(upBtn);
          actions.appendChild(downBtn);
        }

        actions.appendChild(del);

        item.appendChild(checkbox);
        item.appendChild(name);
        item.appendChild(actions);
        taskList.appendChild(item);
      });
    }

    function openDayCheckModal() {
      if (state.tasks.length === 0) {
        undoneList.innerHTML = `<p>昨日のタスクはありませんでした。確認OKで今日のタスクを開始します。</p>`;
      } else {
        undoneList.innerHTML = `
          <strong>昨日のタスク一覧</strong>
          <ul style="list-style: none; padding-left: 0;">
            ${state.tasks.map(task => `
              <li style="margin-bottom: 6px;">
                ${task.done ? '✅' : '⬜'} <span style="${task.done ? 'text-decoration: line-through; color: var(--sub);' : ''}">${escapeHtml(task.name)}（${TYPE_LABELS[task.type]}）</span>
              </li>
            `).join("")}
          </ul>
        `;
      }

      dayCheckModal.classList.add("show");
      setMascot("sleep", "昨日のタスク確認をするピヨ…");
      saveState();
      render();
    }

    function getGymLevel(points) {
      if (points >= 50) return 3;
      if (points >= 20) return 2;
      return 1;
    }

    function setMascot(emotion, message) {
      state.mascotState = emotion;
      if (mascotImage) {
        let src = `assets/chick_${emotion}.png`;
        if (emotion === "normal") {
          if (state.loginDays >= 50) {
            src = "assets/chick_normal GoldCrown.png";
          } else if (state.loginDays >= 30) {
            src = "assets/chick_normal SilverCrown.png";
          }
        }
        mascotImage.src = src;
      }
      if (message) messageBox.textContent = message;

      if (["happy", "surprised", "tired"].includes(emotion)) {
        setTimeout(() => {
          state.mascotState = "normal";
          saveState();
          render();
        }, 1800);
      }
    }

    function getTodayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function updateRecurringFreqValue() {
      const freq = recurringFreq.value;
      recurringFreqValue.innerHTML = "";
      if (freq === "daily") {
        recurringFreqValue.style.display = "none";
      } else if (freq === "weekly") {
        recurringFreqValue.style.display = "block";
        WEEK_DAYS.forEach((day, index) => {
          recurringFreqValue.innerHTML += `<option value="${index}">${day}曜日</option>`;
        });
      } else if (freq === "monthly") {
        recurringFreqValue.style.display = "block";
        for (let i = 1; i <= 31; i++) {
          recurringFreqValue.innerHTML += `<option value="${i}">${i}日</option>`;
        }
      }
    }

    recurringFreq.addEventListener("change", updateRecurringFreqValue);

    openRecurringModalBtn.addEventListener("click", () => {
      updateRecurringFreqValue();
      renderRecurringList();
      recurringModal.classList.add("show");
    });

    closeRecurringBtn.addEventListener("click", () => {
      recurringModal.classList.remove("show");
    });

    recurringForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = recurringInput.value.trim();
      if (!name) return;
      if (!state.recurringTasks) state.recurringTasks = [];
      
      const newRt = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        name,
        type: recurringType.value,
        frequency: recurringFreq.value,
        freqValue: recurringFreqValue.value
      };
      state.recurringTasks.push(newRt);
      
      const todayDate = new Date();
      const dayOfWeek = todayDate.getDay();
      const dateOfMonth = todayDate.getDate();
      
      let shouldSpawn = false;
      if (newRt.frequency === "daily") {
         shouldSpawn = true;
      } else if (newRt.frequency === "weekly" && parseInt(newRt.freqValue) === dayOfWeek) {
         shouldSpawn = true;
      } else if (newRt.frequency === "monthly" && parseInt(newRt.freqValue) === dateOfMonth) {
         shouldSpawn = true;
      }

      if (shouldSpawn) {
         state.tasks.unshift({
           id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
           name: newRt.name,
           type: newRt.type,
           deadline: null,
           done: false,
           createdAt: new Date().toISOString()
         });
         render();
      }
      
      recurringInput.value = "";
      saveState();
      renderRecurringList();
    });

    window.deleteRecurringTask = function(id) {
      if (!confirm("この定期タスクを削除しますか？")) return;
      state.recurringTasks = state.recurringTasks.filter(t => t.id !== id);
      saveState();
      renderRecurringList();
    };

    function renderRecurringList() {
      if (!state.recurringTasks || state.recurringTasks.length === 0) {
        recurringList.innerHTML = `<p style="text-align: center; color: var(--sub);">登録されている定期タスクはありません。</p>`;
        return;
      }
      
      recurringList.innerHTML = state.recurringTasks.map(rt => {
        let freqText = "毎日";
        if (rt.frequency === "weekly") freqText = `毎週 ${WEEK_DAYS[parseInt(rt.freqValue)]}曜日`;
        if (rt.frequency === "monthly") freqText = `毎月 ${rt.freqValue}日`;
        
        return `
          <div class="recurring-item">
            <div class="recurring-info">
              <span class="freq-badge">${freqText}</span>
              ${escapeHtml(rt.name)} <span style="font-size: 11px; color: var(--sub);">(${TYPE_LABELS[rt.type]})</span>
            </div>
            <button class="delete-btn" type="button" onclick="deleteRecurringTask('${rt.id}')">削除</button>
          </div>
        `;
      }).join("");
    }

    let audioUnlocked = false;
    const audioCache = {};
    const SOUND_FILES = ["キラッ1.mp3", "キラッ2.mp3", "決定ボタンを押す21.mp3", "ヒヨコの鳴き声.mp3"];

    function unlockAudio() {
      if (audioUnlocked) return;
      SOUND_FILES.forEach(file => {
        const audio = new Audio(`assets/${file}`);
        audio.volume = 0;
        audio.play().then(() => {
          audio.pause();
          audio.currentTime = 0;
        }).catch(() => {});
        audioCache[file] = audio;
      });
      audioUnlocked = true;
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('click', unlockAudio, { once: true });

    function playSound(filename) {
      if (!state.soundEnabled) return;
      let audio = audioCache[filename];
      if (audio) {
        audio = audio.cloneNode();
      } else {
        audio = new Audio(`assets/${filename}`);
      }
      audio.volume = 0.5;
      audio.play().catch(e => console.log("音声再生がブラウザにブロックされました:", e));
    }

    function spawnCoins(count) {
      const cityScene = document.querySelector(".city-scene");
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const coin = document.createElement("img");
          coin.src = "assets/ptコイン.png";
          coin.className = "coin-effect";
          coin.style.left = `${10 + Math.random() * 80}%`;
          if (cityScene) {
            cityScene.appendChild(coin);
          } else {
            document.body.appendChild(coin);
          }
          coin.addEventListener("animationend", () => coin.remove());
        }, i * 200);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...initialState };
        return { ...initialState, ...JSON.parse(raw) };
      } catch (error) {
        console.error(error);
        return { ...initialState };
      }
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
