<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>e-Gym City 画像切り出しツール</title>
<style>
  body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; padding: 20px; background: #1a2332; color: #fff; margin: 0; }
  .container { display: flex; gap: 24px; align-items: flex-start; margin-top: 10px; }
  .canvas-container { overflow: auto; max-width: calc(100vw - 360px); max-height: 80vh; background: #0b121c; border: 2px solid #3a82ca; border-radius: 8px; }
  .canvas-wrapper { position: relative; display: inline-block; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAGElEQVQYV2NkYGAwYkAD////Z8SijyLVAAB+Ex0Et8B4YgAAAABJRU5ErkJggg=='); }
  canvas { cursor: crosshair; display: block; }
  .controls { width: 300px; background: #24415f; padding: 20px; border-radius: 12px; border: 2px solid #3a82ca; box-shadow: 0 8px 16px rgba(0,0,0,0.4); flex-shrink: 0; }
  select { width: 100%; padding: 10px; margin-bottom: 14px; font-size: 15px; border-radius: 6px; border: 1px solid #71c8ff; background: #112d52; color: white; }
  button { width: 100%; padding: 12px; background: #70e27b; color: #06101f; border: none; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 0 #4caf50; transition: transform 0.1s, box-shadow 0.1s; }
  button:hover { background: #85f290; }
  button:active { transform: translateY(4px); box-shadow: 0 0 0 #4caf50; }
  .preview { margin-top: 20px; border: 2px dashed #71c8ff; background: rgba(0,0,0,0.2); min-height: 120px; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px; }
  .preview img { max-width: 100%; max-height: 200px; image-rendering: pixelated; }
  h1 { margin: 0 0 10px; font-size: 24px; color: #fff7d6; }
  h3 { margin-top: 0; font-size: 18px; color: #b9d7ff; border-bottom: 2px solid #3a82ca; padding-bottom: 8px; margin-bottom: 16px; }
  p { color: #b9d7ff; line-height: 1.5; margin-top: 0; }
  #selection { position: absolute; border: 2px dashed #ffcf66; background: rgba(255, 207, 102, 0.2); pointer-events: none; display: none; }
  .step { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 14px; font-size: 14px; }
  .step b { color: #ffd84d; }
</style>
</head>
<body>
<h1>✂️ 画像切り出しツール（e-Gym City用）</h1>
<p>このツールを使えば、一枚のラフ画から必要なパーツを簡単に切り出して保存できます。</p>

<div style="margin-bottom: 20px;">
  <label for="imageUpload" style="background: #3a82ca; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block;">📁 画像ファイル（e_gym_city_ラフ画.png）を読み込む</label>
  <input type="file" id="imageUpload" accept="image/png, image/jpeg" style="display: none;">
</div>

<div class="container">
  <div class="canvas-container">
    <div class="canvas-wrapper">
      <canvas id="sourceCanvas"></canvas>
      <div id="selection"></div>
    </div>
  </div>
  
  <div class="controls">
    <h3>切り出し手順</h3>
    <div class="step"><b>1.</b> 上のボタンから <code>e_gym_city_ラフ画.png</code> を読み込む</div>
    <div class="step"><b>2.</b> 左の画像で、切り出したいパーツをドラッグして四角で囲む</div>
    <div class="step"><b>3.</b> 下のリストからファイル名を選ぶ</div>
    <div class="step"><b>4.</b> ダウンロードボタンを押す</div>
    <div class="step" style="font-size:12px; color:#ff6b6b;">※保存した画像は <code>assets</code> フォルダの中に入れてください。</div>

    <h3 style="margin-top: 24px;">設定</h3>
    <select id="filename">
      <option value="town_background.png">town_background.png (背景)</option>
      <option value="gym_lv1.png">gym_lv1.png (ジムLv1)</option>
      <option value="gym_lv2.png">gym_lv2.png (ジムLv2)</option>
      <option value="gym_lv3.png">gym_lv3.png (ジムLv3)</option>
      <option value="chick_normal.png">chick_normal.png (ヒヨコ 通常)</option>
      <option value="chick_happy.png">chick_happy.png (ヒヨコ 喜び)</option>
      <option value="chick_tired.png">chick_tired.png (ヒヨコ 疲れ)</option>
      <option value="chick_surprised.png">chick_surprised.png (ヒヨコ 驚き)</option>
      <option value="chick_sleep.png">chick_sleep.png (ヒヨコ 睡眠)</option>
      <option value="tree.png">tree.png (木)</option>
      <option value="bench.png">bench.png (ベンチ)</option>
      <option value="dumbbell.png">dumbbell.png (ダンベル)</option>
      <option value="streetlamp.png">streetlamp.png (街灯)</option>
    </select>
    <button id="downloadBtn">↓ この範囲を保存</button>
    
    <div class="preview" id="previewArea">
      <span style="color:#71c8ff; font-weight:bold;">プレビュー</span>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('sourceCanvas');
  const ctx = canvas.getContext('2d');
  const selectionDiv = document.getElementById('selection');
  const downloadBtn = document.getElementById('downloadBtn');
  const filenameSelect = document.getElementById('filename');
  const previewArea = document.getElementById('previewArea');
  
  const img = new Image();
  document.getElementById('imageUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(event) {
      img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        selectionDiv.style.display = 'none';
        previewArea.innerHTML = '<span style="color:#71c8ff; font-weight:bold;">プレビュー</span>';
        rect = {x:0, y:0, w:0, h:0};
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  let isDragging = false;
  let startX = 0, startY = 0;
  let currentX = 0, currentY = 0;
  let rect = { x: 0, y: 0, w: 0, h: 0 };

  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    const rectBounds = canvas.getBoundingClientRect();
    startX = e.clientX - rectBounds.left;
    startY = e.clientY - rectBounds.top;
    selectionDiv.style.display = 'block';
    selectionDiv.style.left = startX + 'px';
    selectionDiv.style.top = startY + 'px';
    selectionDiv.style.width = '0px';
    selectionDiv.style.height = '0px';
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const canvasRect = canvas.getBoundingClientRect();
    currentX = Math.max(0, Math.min(e.clientX - canvasRect.left, canvas.width));
    currentY = Math.max(0, Math.min(e.clientY - canvasRect.top, canvas.height));
    
    rect.x = Math.min(startX, currentX);
    rect.y = Math.min(startY, currentY);
    rect.w = Math.abs(currentX - startX);
    rect.h = Math.abs(currentY - startY);
    
    selectionDiv.style.left = rect.x + 'px';
    selectionDiv.style.top = rect.y + 'px';
    selectionDiv.style.width = rect.w + 'px';
    selectionDiv.style.height = rect.h + 'px';
    
    updatePreview();
  });

  canvas.addEventListener('mouseup', () => {
    isDragging = false;
  });

  canvas.addEventListener('mouseleave', () => {
    isDragging = false;
  });

  function updatePreview() {
    if (rect.w <= 0 || rect.h <= 0) return;
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = rect.w;
    tempCanvas.height = rect.h;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(canvas, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
    
    previewArea.innerHTML = '';
    const previewImg = new Image();
    previewImg.src = tempCanvas.toDataURL('image/png');
    previewArea.appendChild(previewImg);
  }

  downloadBtn.addEventListener('click', () => {
    if (!img.src) {
      alert('まずは「ラフ画を読み込む」ボタンから画像を読み込んでください！');
      return;
    }
    if (rect.w <= 0 || rect.h <= 0) {
      alert('画像上でドラッグして、切り出す範囲を選択してください！');
      return;
    }
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = rect.w;
    tempCanvas.height = rect.h;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(canvas, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
    
    const link = document.createElement('a');
    link.download = filenameSelect.value;
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
